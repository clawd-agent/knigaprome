name: CI/CD

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  ci:
    name: Lint and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint (if configured)
        run: |
          if ([ -f .eslintrc.json ] || [ -f .eslintrc.js ] || [ -f eslint.config.js ] || [ -f eslint.config.mjs ]) && npm ls eslint --depth=0 >/dev/null 2>&1; then
            npm run lint
          else
            echo "ESLint is not fully configured. Skipping lint."
          fi

      - name: Build
        run: npm run build

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref_name == github.event.repository.default_branch
    env:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_PORT: ${{ secrets.SSH_PORT }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      GITHUB_REPOSITORY: ${{ github.repository }}
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}

    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf "%s\n" "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          if [ -n "$SSH_KNOWN_HOSTS" ]; then
            printf "%s\n" "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          else
            ssh-keyscan -p "${SSH_PORT:-22}" "$SSH_HOST" >> ~/.ssh/known_hosts
          fi

      - name: Deploy via SSH
        run: |
          ssh -p "${SSH_PORT:-22}" "$SSH_USER@$SSH_HOST" << EOF
            set -euo pipefail
            TMP_DIR=\$(mktemp -d)
            trap 'rm -rf "\$TMP_DIR"' EXIT

            git clone --depth=1 --branch "$DEFAULT_BRANCH" "https://github.com/$GITHUB_REPOSITORY.git" "\$TMP_DIR"
            mkdir -p "$DEPLOY_PATH"
            rsync -a \
              --exclude ".env.production" \
              --exclude "data/" \
              "\$TMP_DIR"/ "$DEPLOY_PATH"/

            cd "$DEPLOY_PATH"
            mkdir -p data/generated
            docker compose -f docker-compose.prod.yml up -d --build --remove-orphans
            docker image prune -f
          EOF
